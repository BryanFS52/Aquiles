syntax = "proto3";

option java_multiple_files = true;
option java_package = "com.api.aquilesApi.proto";
option java_outer_classname = "DesertionProto";

package desertion;

service DesertionService {
  rpc notifyDesertionProcess(DesertionRequest) returns (DesertionResponse);
}

message DesertionRequest {
  int64 studentId = 1;
  string motivo = 2;
  int64 teacherId = 3;
}

message DesertionResponse {
  bool success = 1;
  string message = 2;
}