<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
        }
        .container {
            width: 90%;
            max-width: 600px;
            margin: auto;
            background-color: #ffffff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        .header {
            background-color: #057687;
            color: white;
            padding: 15px;
            text-align: center;
            border-radius: 8px 8px 0 0;
        }
        .content {
            margin-top: 20px;
            line-height: 1.6;
        }
        .footer {
            margin-top: 20px;
            font-size: 12px;
            color: #888;
            text-align: center;
            border-top: 1px solid #e0e0e0;
            padding-top: 10px;
        }
        h1 {
            margin: 0;
            font-size: 24px;
        }
        p {
            margin: 10px 0;
        }
        ul {
            margin: 10px 0;
            padding-left: 20px;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>Confirmacion Cambio De Contraseña</h1>
    </div>
    <div class="content">
        <p>Estimado/a [Usuario],</p>
        <p>Este es un recordatorio para informarte que tu contraseña fue Cambiada Con Exito.</p>
        <p>Si tienes alguna Duda Puedes Comunicarte Con:</p>
        <ul>
            <li>xxx</li>
            <li>xxx</li>
            <li>xxx</li>
        </ul>
        <p>Gracias por tu atención.</p>
    </div>
    <div class="footer">
        <p>Este es un correo automático, por favor no respondas.</p>
    </div>
</div>
</body>
</html>
