spring:
  application:
    name: Aquiles


  datasource:
    url: jdbc:postgresql://localhost:5432/Aquiles
    username: postgres
    password: "123"
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop

    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    show-sql: true
  main:
    allow-circular-references: true